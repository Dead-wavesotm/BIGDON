<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD WAVE — Ultimate Edition</title>

<!-- Link to your external CSS file -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- DAMAGE VIGNETTE -->
<div id="damage-vignette"></div>

<!-- BOSS HEALTH BAR -->
<div id="boss-health-bar-container">
  <div class="boss-name" id="boss-name"></div>
  <div class="boss-bar-wrap"><div class="boss-bar" id="boss-bar" style="width:100%"></div></div>
</div>

<!-- CANVAS -->
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <div class="hud-top">
    <div class="hud-box" style="min-width:130px">
      <div class="hud-label">HEALTH</div>
      <div class="hud-val" id="hud-hp">100</div>
      <div class="hud-bar-wrap"><div class="hud-bar bar-hp" id="bar-hp" style="width:100%"></div></div>
    </div>
    <div class="hud-box" style="min-width:110px">
      <div class="hud-label">WAVE</div>
      <div class="hud-val" id="hud-wave">1</div>
      <div style="font-size:7px;color:#666;margin-top:4px" id="hud-remain">— ZOMBIES</div>
    </div>
    <div class="hud-box" style="min-width:110px">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="hud-score">0</div>
      <div style="font-size:7px;color:#ffaa00;margin-top:4px" id="hud-combo"></div>
    </div>
    <div class="hud-box" style="min-width:110px">
      <div class="hud-label">LUCK</div>
      <div class="hud-val" style="color:#dd88ff" id="hud-luck">0</div>
      <div class="hud-bar-wrap"><div class="hud-bar bar-luck" id="bar-luck" style="width:0%"></div></div>
    </div>
  </div>
  <div class="hud-bottom">
    <div class="weapon-box" id="weapon-box">
      <div class="hud-label">WEAPON</div>
      <div class="weapon-name" id="weapon-name">PISTOL</div>
      <div style="font-size:7px;color:#555;margin-top:4px" id="weapon-upgrades"></div>
    </div>
    <div class="hud-box" style="min-width:130px">
      <div class="hud-label">AMMO</div>
      <div class="hud-val" id="hud-ammo">30</div>
      <div class="hud-bar-wrap"><div class="hud-bar bar-ammo" id="bar-ammo" style="width:100%"></div></div>
      <div style="font-size:7px;color:#555;margin-top:4px" id="hud-reload-hint"></div>
    </div>
    <div class="hud-box" style="min-width:90px; text-align:center">
      <div class="hud-label">KILLS</div>
      <div class="hud-val" style="color:#ff4444" id="hud-kills">0</div>
    </div>
  </div>
</div>

<!-- WAVE ANNOUNCE -->
<div id="wave-announce"></div>

<!-- LUCK NOTIFICATION -->
<div id="luck-notify"></div>

<!-- UPGRADE MENU -->
<div id="upgrade-menu">
  <div class="upgrade-panel">
    <div class="upgrade-title">⚔ UPGRADE YOUR ARSENAL ⚔</div>
    <div class="upgrade-sub" id="upgrade-sub">Choose 1 upgrade — Luck boosts rare options</div>
    <div class="upgrade-cards" id="upgrade-cards"></div>
    <div class="skip-btn"><button onclick="Game.skipUpgrade()">SKIP</button></div>
  </div>
</div>

<!-- JACKPOT WHEEL -->
<div id="jackpot-wheel-overlay">
  <div class="wheel-panel">
    <div class="wheel-title">LEVEL UP!</div>
    <div class="wheel-sub">Spin the wheel to get a new weapon!</div>
    <div class="wheel-container">
      <canvas id="jackpot-canvas" class="wheel-canvas" width="300" height="300"></canvas>
      <div class="wheel-pointer"></div>
    </div>
    <button class="spin-btn" id="spin-button" onclick="spinJackpotWheel()">SPIN!</button>
    <div class="wheel-result" id="wheel-result"></div>
  </div>
</div>

<!-- MAIN OVERLAY -->
<div id="overlay">
  <div class="screen" id="main-screen">
    <!-- populated by JS -->
  </div>
</div>

<!-- Game Scripts -->
<script src="game.js"></script>
</body>
</html>
